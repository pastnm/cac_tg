name: "cac"

on:
  workflow_dispatch:
  push:
    paths:
      - 'Library/**'
  schedule:
    - cron: '10 * * * *'
    - cron: '40 * * * *'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get Change Log
        id: vars
        run: |
          # 获取最后一次提交的说明和变动文件
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          CHANGES=$(git diff --name-only HEAD^ HEAD | head -n 5)
          
          echo "MSG_CONTENT=仓库更新通知：
          内容：$COMMIT_MSG
          文件：$CHANGES" >> $GITHUB_ENV

      - name: Send Telegram Message
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            --data-urlencode "text=${{ env.MSG_CONTENT }}"
