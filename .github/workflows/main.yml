name: "cac"

on:
  workflow_dispatch:
  push:
    paths:
      - 'Library/**'
  schedule:
    - cron: '10 * * * *'
    - cron: '40 * * * *'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get Latest Changes
        id: vars
        run: |
          # 获取 Library 目录下最新变动的文件名
          DIFF=$(git diff --name-only HEAD^ HEAD | grep "Library/" | head -n 5 || echo "No files changed in Library")
          echo "CHANGES<<EOF" >> $GITHUB_ENV
          echo "$DIFF" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Telegram Notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            --data-urlencode "text=🔔 仓库更新通知
          
          最新变动文件：
          ${{ env.CHANGES }}"
