name: "cac"

on:
  workflow_dispatch:
  schedule:
    - cron: '10 * * * *'
    - cron: '40 * * * *'

jobs:
  cac:
    uses: invalidunit/check_change/.github/workflows/cac_telegram.yml@main
    secrets:
      _token: ${{ secrets.TG_BOT_TOKEN }}
      _chat_id: ${{ secrets.TG_CHAT_ID }}

  test_telegram:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Test Message
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TG_CHAT_ID }}" \
          --data-urlencode "text=GitHub Actions 测试成功"

  remove_all_old_actions:
    uses: invalidunit/action/.github/workflows/remove_all_actions.yml@main
